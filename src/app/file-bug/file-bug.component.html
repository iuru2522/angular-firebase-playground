<div class="file-bug-container">
    <h2>{{ isEditMode() ? 'Edit Bug Report' : 'File a Bug Report' }}</h2>

    <form [formGroup]="bugForm" (ngSubmit)="onSubmit()">


        <div class="form-group">
            <label for="title">Bug title *</label>
            <input type="text" id="title" formControlName="title" placeholder="Brief description of the bug">
        </div>
        <div class="form-group">
            <label for="description">Description *</label>
            <textarea id="description" rows="5" formControlName="description"
                placeholder="Detailed description of the bug and steps to reproduce"></textarea>
        </div>

        <div class="form-group">
            <label for="severity">Severity</label>
            <select id="severity" formControlName="severity">
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
                <option value="critical">Critical</option>
            </select>
        </div>

        <div class="form-actions">
            <button
                type="submit"
                class="btn btn-primary"
                [disabled]="bugForm.invalid || isSubmitting()"
                [class.is-submitting]="isSubmitting()"
                [attr.aria-busy]="isSubmitting() ? true : null"
            >
                @if (isSubmitting()) {
                    {{ isEditMode() ? 'Updating...' : 'Submitting...' }}
                } @else {
                    {{ isEditMode() ? 'Update Bug Report' : 'Submit Bug Report' }}
                }
            </button>
            <button type="button" class="btn btn-secondary" (click)="onCancel()" [disabled]="isSubmitting()">
                Cancel
            </button>
        </div>

    </form>

</div>
